<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NI-JAP — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Rajdhani',sans-serif;
      background:#020209;
      color:#eeeeff;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:1rem;
    }
    .auth-box {
      background:#0c0c1c;
      border:1px solid rgba(0,255,229,.2);
      border-radius:16px;
      padding:2.5rem;
      width:100%;
      max-width:420px;
      box-shadow:0 0 60px rgba(0,255,229,.08);
    }
    .auth-logo {
      font-family:'Orbitron',monospace;
      font-weight:900;
      font-size:1.5rem;
      color:#00ffe5;
      text-align:center;
      margin-bottom:.3rem;
      text-shadow:0 0 20px rgba(0,255,229,.5);
    }
    .auth-sub {
      text-align:center;
      font-size:.75rem;
      color:#7777aa;
      letter-spacing:.2em;
      text-transform:uppercase;
      margin-bottom:2rem;
    }
    .auth-tabs {
      display:flex;
      border:1px solid rgba(255,255,255,.08);
      border-radius:6px;
      overflow:hidden;
      margin-bottom:2rem;
    }
    .auth-tab {
      flex:1;
      padding:.7rem;
      font-family:'Orbitron',monospace;
      font-size:.65rem;
      font-weight:700;
      letter-spacing:.15em;
      text-transform:uppercase;
      border:none;
      cursor:pointer;
      transition:all .2s;
      background:transparent;
      color:#7777aa;
    }
    .auth-tab.active {
      background:linear-gradient(135deg,#00b4ff,#8b2be2);
      color:white;
    }
    .form-group { margin-bottom:1.2rem; }
    .form-label {
      display:block;
      font-family:'Orbitron',monospace;
      font-size:.6rem;
      font-weight:700;
      letter-spacing:.2em;
      color:#00ffe5;
      text-transform:uppercase;
      margin-bottom:.5rem;
    }
    .form-input {
      width:100%;
      background:#07070f;
      border:1px solid rgba(139,43,226,.3);
      border-radius:5px;
      padding:.85rem 1rem;
      color:#eeeeff;
      font-family:'Rajdhani',sans-serif;
      font-size:.95rem;
      outline:none;
      transition:all .25s;
    }
    .form-input:focus {
      border-color:#8b2be2;
      box-shadow:0 0 15px rgba(139,43,226,.25);
    }
    .form-input::placeholder { color:#7777aa; }
    .auth-btn {
      width:100%;
      padding:.9rem;
      font-family:'Orbitron',monospace;
      font-weight:700;
      font-size:.72rem;
      letter-spacing:.15em;
      text-transform:uppercase;
      border:none;
      border-radius:5px;
      cursor:pointer;
      background:linear-gradient(135deg,#00b4ff,#8b2be2);
      color:white;
      box-shadow:0 0 20px rgba(0,180,255,.3);
      transition:all .3s;
      margin-top:.5rem;
    }
    .auth-btn:hover {
      box-shadow:0 0 35px rgba(0,180,255,.6);
      transform:translateY(-2px);
    }
    .auth-btn:disabled {
      opacity:.6;
      cursor:not-allowed;
      transform:none;
    }
    .auth-feedback {
      margin-top:1rem;
      padding:.7rem 1rem;
      border-radius:6px;
      font-size:.85rem;
      font-weight:600;
      text-align:center;
      display:none;
    }
    .auth-feedback.success {
      display:block;
      background:rgba(0,255,229,.1);
      border:1px solid rgba(0,255,229,.3);
      color:#00ffe5;
    }
    .auth-feedback.error {
      display:block;
      background:rgba(255,0,170,.1);
      border:1px solid rgba(255,0,170,.3);
      color:#ff00aa;
    }
    .auth-footer {
      text-align:center;
      font-size:.78rem;
      color:#7777aa;
      margin-top:1.5rem;
    }
    .auth-footer a {
      color:#00ffe5;
      text-decoration:none;
    }
  </style>
</head>
<body>

<div class="auth-box">
  <div class="auth-logo">NI-JAP</div>
  <div class="auth-sub">Convention Otaku · Niamey 2026</div>

  <!-- Onglets Connexion / Inscription -->
  <div class="auth-tabs">
    <button class="auth-tab active" onclick="switchTab('login')">Connexion</button>
    <button class="auth-tab" onclick="switchTab('register')">Inscription</button>
  </div>

  <!-- Formulaire Connexion -->
  <div id="form-login">
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" id="login-email" class="form-input" placeholder="ton@email.com">
    </div>
    <div class="form-group">
      <label class="form-label">Mot de passe</label>
      <input type="password" id="login-password" class="form-input" placeholder="••••••••">
    </div>
    <button class="auth-btn" onclick="handleLogin()">Se connecter →</button>
  </div>

  <!-- Formulaire Inscription -->
  <div id="form-register" style="display:none;">
    <div class="form-group">
      <label class="form-label">Pseudo</label>
      <input type="text" id="reg-username" class="form-input" placeholder="TonPseudoOtaku">
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" id="reg-email" class="form-input" placeholder="ton@email.com">
    </div>
    <div class="form-group">
      <label class="form-label">Mot de passe</label>
      <input type="password" id="reg-password" class="form-input" placeholder="Min. 6 caractères">
    </div>
    <div class="form-group">
      <label class="form-label">Ville</label>
      <input type="text" id="reg-ville" class="form-input" placeholder="Niamey">
    </div>
    <button class="auth-btn" onclick="handleRegister()">Créer mon compte ⚡</button>
  </div>

  <!-- Message retour -->
  <div class="auth-feedback" id="authFeedback"></div>

  <div class="auth-footer">
    <a href="index.html">← Retour au site</a>
  </div>
</div>

<script>
  // ── Config Supabase ──
  const SUPABASE_URL = 'https://TONPROJET.supabase.co'; // ← remplace
  const SUPABASE_KEY = 'TA_CLE_PUBLIQUE';               // ← remplace
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  // ── Onglets ──
  function switchTab(tab) {
    document.getElementById('form-login').style.display    = tab === 'login'    ? 'block' : 'none';
    document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
    document.querySelectorAll('.auth-tab').forEach((el, i) => {
      el.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
    });
    hideFb();
  }

  // ── Connexion ──
  async function handleLogin() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    hideFb();

    if (!email || !password) { showFb('error', '⚠️ Remplis tous les champs.'); return; }

    const btn = document.querySelector('#form-login .auth-btn');
    btn.disabled = true; btn.textContent = '⏳ Connexion...';

    const { error } = await db.auth.signInWithPassword({ email, password });

    if (error) {
      showFb('error', '❌ Email ou mot de passe incorrect.');
    } else {
      showFb('success', '✅ Connecté ! Redirection...');
      setTimeout(() => window.location.href = 'index.html', 1500);
    }
    btn.disabled = false; btn.textContent = 'Se connecter →';
  }

  // ── Inscription ──
  async function handleRegister() {
    const username = document.getElementById('reg-username').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const ville    = document.getElementById('reg-ville').value.trim() || 'Niamey';
    hideFb();

    if (!username || !email || !password) { showFb('error', '⚠️ Remplis tous les champs.'); return; }
    if (password.length < 6) { showFb('error', '⚠️ Mot de passe trop court (min. 6 caractères).'); return; }

    const btn = document.querySelector('#form-register .auth-btn');
    btn.disabled = true; btn.textContent = '⏳ Création...';

    // Crée le compte dans Supabase Auth
    const { data, error } = await db.auth.signUp({ email, password });

    if (error) {
      showFb('error', '❌ ' + error.message);
    } else {
      // Crée le profil dans la table profiles
      await db.from('profiles').insert([{
        id: data.user.id,
        username,
        ville
      }]);
      showFb('success', '🎌 Compte créé ! Vérifie ta boîte mail pour confirmer.');
      setTimeout(() => switchTab('login'), 2500);
    }
    btn.disabled = false; btn.textContent = 'Créer mon compte ⚡';
  }

  function showFb(type, msg) {
    const el = document.getElementById('authFeedback');
    el.className = 'auth-feedback ' + type;
    el.textContent = msg;
  }
  function hideFb() {
    document.getElementById('authFeedback').className = 'auth-feedback';
  }

  // Vérifie si déjà connecté
  db.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = 'index.html';
  });
</script>

</body>
</html>
